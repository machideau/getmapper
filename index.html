<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UK Campus Locator | Database de Salles</title>
    <meta name="description" content="Créez votre base de données des salles et bâtiments de l'UK avec géolocalisation précise.">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css" />
</head>
<body class="dark-theme">
    <div id="app">
        <div id="map"></div>
        
        <div class="overlay">
            <header>
                <h1>UK <span>Mapper</span></h1>
                <p>Database des Salles & Bâtiments</p>
            </header>

            <main>
                <div id="status-indicator" class="hidden">
                    <div class="pulse"></div>
                    <span id="status-text">Localisation en cours...</span>
                </div>

                <div id="capture-card" class="glass-card hidden">
                    <h3>Nouvelle Position</h3>
                    <div class="coords">
                        <span id="lat">0.0000</span>, <span id="lng">0.0000</span>
                    </div>
                    <div class="campus-selection">
                        <label>
                            <input type="radio" name="campus" value="Sud" checked>
                            <span>Campus Sud</span>
                        </label>
                        <label>
                            <input type="radio" name="campus" value="Nord">
                            <span>Campus Nord</span>
                        </label>
                    </div>
                    <div class="input-group">
                        <select id="location-type">
                            <option value="Amphi">Amphi</option>
                            <option value="Salle de cours">Salle de cours</option>
                            <option value="Bureau">Bureau</option>
                            <option value="Labo">Labo</option>
                            <option value="Cafétéria">Cafétéria</option>
                            <option value="Bibliothèque">Bibliothèque</option>
                            <option value="Autre" selected>Autre</option>
                        </select>
                        <input type="text" id="location-name" placeholder="Nom de la salle ou bâtiment..." autocomplete="off">
                        <textarea id="location-description" placeholder="Description du bâtiment ou de la salle..." rows="2"></textarea>
                        <input type="hidden" id="location-id">
                        <button id="save-btn" class="primary-btn">Sauvegarder</button>
                    </div>
                    <button id="cancel-btn" class="text-btn">Annuler</button>
                </div>

                <div id="list-container" class="glass-card">
                    <div class="list-header">
                        <h2>Positions Enregistrées</h2>
                        <span id="count">0</span>
                    </div>
                    
                    <div class="search-box">
                        <input type="text" id="search-input" placeholder="Rechercher une salle..." autocomplete="off">
                    </div>

                    <div class="filter-tabs">
                        <button class="filter-tab active" data-filter="all">Tous</button>
                        <button class="filter-tab" data-filter="Sud">Sud</button>
                        <button class="filter-tab" data-filter="Nord">Nord</button>
                    </div>

                    <div id="location-list" class="scrollable">
                        <div class="empty-state">Chargement...</div>
                    </div>
                </div>
            </main>

            <div class="fab-container">
                <button id="get-btn" class="fab">
                    <span class="icon">GET</span>
                    <span class="label">POSITION</span>
                </button>
            </div>
        </div>
    </div>

    <script type="module" src="/src/main.js"></script>
</body>
</html>
